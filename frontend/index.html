<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Desktop Agent</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --panel: #16213e;
            --border: #2a3a5c;
            --text: #e0e0e0;
            --accent: #4fc3f7;
            --success: #66bb6a;
            --error: #ef5350;
            --warning: #ffa726;
            --dim: #78909c;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* VNC Viewer */
        #vnc-panel {
            flex: 1;
            min-width: 0;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-right: 2px solid var(--border);
        }
        #vnc-screen {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #vnc-status {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(0,0,0,0.7);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            color: var(--dim);
        }
        #vnc-status.connected { color: var(--success); }

        /* Sidebar */
        #sidebar {
            width: 380px;
            min-width: 380px;
            background: var(--panel);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        #sidebar h1 {
            font-size: 18px;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            background: #0f3460;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Sections */
        .section {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
        }
        .section h2 {
            font-size: 13px;
            color: var(--dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        /* Instruction */
        #instruction {
            width: 100%;
            height: 80px;
            background: #0d1b2a;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            padding: 10px;
            font-size: 14px;
            resize: vertical;
            font-family: inherit;
        }
        #instruction:focus {
            outline: none;
            border-color: var(--accent);
        }
        #submit-btn {
            width: 100%;
            margin-top: 8px;
            padding: 10px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        #submit-btn:hover { background: #81d4fa; }
        #submit-btn:disabled {
            background: var(--dim);
            cursor: not-allowed;
        }

        /* Status */
        #state-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        .state-idle { background: var(--dim); color: #fff; }
        .state-executing { background: var(--accent); color: #000; }
        .state-completed { background: var(--success); color: #000; }
        .state-failed { background: var(--error); color: #fff; }
        .state-paused { background: var(--warning); color: #000; }

        #stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-top: 10px;
        }
        .stat {
            background: #0d1b2a;
            padding: 8px;
            border-radius: 6px;
            text-align: center;
        }
        .stat .val { font-size: 20px; font-weight: 700; }
        .stat .lbl { font-size: 10px; color: var(--dim); margin-top: 2px; }

        /* Controls */
        #controls {
            display: flex;
            gap: 8px;
        }
        #controls button {
            flex: 1;
            padding: 8px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: #0d1b2a;
            color: var(--text);
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }
        #controls button:hover { background: #1a3a5c; }
        #controls button:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Log */
        #log {
            flex: 1;
            min-height: 150px;
            max-height: 300px;
            overflow-y: auto;
            font-size: 12px;
            font-family: 'SF Mono', 'Consolas', monospace;
            background: #0d1b2a;
            border-radius: 6px;
            padding: 8px;
            margin-top: 8px;
        }
        #log .entry {
            padding: 3px 6px;
            border-radius: 3px;
            margin-bottom: 2px;
        }
        #log .entry.action { border-left: 2px solid var(--accent); }
        #log .entry.error { border-left: 2px solid var(--error); color: var(--error); }
        #log .entry.state { border-left: 2px solid var(--dim); color: var(--dim); }
        #log .entry.complete { border-left: 2px solid var(--success); color: var(--success); }
        #log .time { color: var(--dim); margin-right: 6px; }
    </style>
</head>
<body>

<!-- VNC Viewer -->
<div id="vnc-panel">
    <div id="vnc-screen">
        <span id="vnc-placeholder" style="color:var(--dim);font-size:14px;">
            VMに接続中...
        </span>
    </div>
    <div id="vnc-status">⏳ VNC未接続</div>
</div>

<!-- Sidebar -->
<div id="sidebar">
    <h1>🤖 AI Desktop Agent</h1>

    <!-- Instruction -->
    <div class="section">
        <h2>📝 指示</h2>
        <textarea id="instruction" placeholder="例: LibreOfficeで表を作成して /data/report.ods に保存してください"></textarea>
        <button id="submit-btn" onclick="submitTask()">▶ 実行</button>
    </div>

    <!-- Status -->
    <div class="section">
        <h2>📊 状態</h2>
        <div>
            状態: <span id="state-badge" class="state-idle">IDLE</span>
            <span id="subtask-info" style="font-size:12px;color:var(--dim);margin-left:8px;"></span>
        </div>
        <div id="stats">
            <div class="stat"><div class="val" id="stat-actions">0</div><div class="lbl">アクション</div></div>
            <div class="stat"><div class="val" id="stat-success">0</div><div class="lbl">成功</div></div>
            <div class="stat"><div class="val" id="stat-failure">0</div><div class="lbl">失敗</div></div>
        </div>
    </div>

    <!-- Controls -->
    <div class="section">
        <h2>🎮 操作</h2>
        <div id="controls">
            <button id="btn-pause" onclick="control('pause')" disabled>⏸ 一時停止</button>
            <button id="btn-resume" onclick="control('resume')" disabled>▶ 再開</button>
            <button id="btn-stop" onclick="control('stop')" disabled>⏹ 停止</button>
        </div>
    </div>

    <!-- Log -->
    <div class="section" style="flex:1;display:flex;flex-direction:column;">
        <h2>📜 ログ</h2>
        <div id="log"><div class="entry state"><span class="time">--:--</span>待機中...</div></div>
    </div>
</div>

<script type="module">
// ── Configuration ──
const BACKEND_URL = window.location.origin;
const WS_URL = `${window.location.protocol === 'https:' ? 'wss:' : 'ws:'}//${window.location.host}/ws`;
const VNC_WS_URL = `${window.location.protocol === 'https:' ? 'wss:' : 'ws:'}//${window.location.hostname}:6080`;

// ── noVNC ──
let rfb = null;
const vncScreen = document.getElementById('vnc-screen');
const vncStatus = document.getElementById('vnc-status');
const vncPlaceholder = document.getElementById('vnc-placeholder');

async function initVNC() {
    try {
        const { default: RFB } = await import('https://cdn.jsdelivr.net/npm/@novnc/novnc@1.5.0/lib/rfb.mjs');
        rfb = new RFB(vncScreen, `ws://${window.location.hostname}:6080`, {
            credentials: { password: '' },
            shared: true,
            repeaterID: '',
            wsProtocols: ['binary'],
        });
        rfb.viewOnly = true;  // ユーザーはVMを直接操作できない（AIが操作）
        rfb.scaleViewport = true;
        rfb.resizeSession = false;

        rfb.addEventListener('connect', () => {
            vncStatus.textContent = '✅ VNC接続中';
            vncStatus.className = 'connected';
            if (vncPlaceholder) vncPlaceholder.remove();
        });
        rfb.addEventListener('disconnect', (e) => {
            vncStatus.textContent = '⏳ VNC切断';
            vncStatus.className = '';
            if (e.detail.clean) {
                vncStatus.textContent += ' (正常)';
            } else {
                vncStatus.textContent += ` (再接続中...)`;
                setTimeout(() => { if (rfb) rfb.connect(); }, 3000);
            }
        });
        rfb.addEventListener('credentialsrequired', () => {});
    } catch (e) {
        vncStatus.textContent = '⚠️ noVNC読み込み失敗';
        console.error('noVNC:', e);
    }
}

// ── WebSocket ──
let ws = null;
let reconnectTimer = null;

function connectWS() {
    if (ws && ws.readyState === WebSocket.OPEN) return;
    ws = new WebSocket(WS_URL);

    ws.onopen = () => {
        console.log('WebSocket接続');
        if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
    };

    ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        handleWSMessage(data);
    };

    ws.onclose = () => {
        console.log('WebSocket切断、3秒後に再接続...');
        reconnectTimer = setTimeout(connectWS, 3000);
    };

    ws.onerror = (e) => console.error('WebSocketエラー:', e);
}

function handleWSMessage(data) {
    const now = new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });

    switch (data.type) {
        case 'state':
            updateState(data.state);
            updateSubtaskInfo(data.subtask_index, data.subtask_count);
            updateStat('stat-actions', data.action_count);
            addLog(data.state, 'state', now);
            updateButtons(data.state);
            break;
        case 'action':
            if (data.success) {
                updateStat('stat-success', null, 1);
            } else {
                updateStat('stat-failure', null, 1);
            }
            addLog(`${data.action_type} ${data.description || ''}`, data.success ? 'action' : 'error', now);
            break;
        case 'error':
            addLog(data.message, 'error', now);
            break;
        case 'complete':
            addLog(data.success ? '✅ タスク完了' : '❌ タスク失敗', data.success ? 'complete' : 'error', now);
            updateButtons(data.success ? 'completed' : 'failed');
            document.getElementById('submit-btn').disabled = false;
            break;
        case 'pong':
            break;
    }
}

// ── State ──
const STATE_CLASSES = {
    idle: 'state-idle', understanding: 'state-executing', planning: 'state-executing',
    executing: 'state-executing', waiting: 'state-executing', verifying: 'state-executing',
    recovering: 'state-executing', paused: 'state-paused', completed: 'state-completed',
    failed: 'state-failed',
};

function updateState(state) {
    const badge = document.getElementById('state-badge');
    badge.textContent = state.toUpperCase();
    badge.className = STATE_CLASSES[state] || 'state-idle';
}

function updateSubtaskInfo(idx, count) {
    const el = document.getElementById('subtask-info');
    if (count > 0) {
        el.textContent = `サブタスク ${idx + 1}/${count}`;
    } else {
        el.textContent = '';
    }
}

function updateStat(id, val, delta = null) {
    const el = document.getElementById(id);
    if (val !== null) el.textContent = val;
    else if (delta !== null) el.textContent = parseInt(el.textContent) + delta;
}

function updateButtons(state) {
    const isRunning = ['understanding', 'planning', 'executing', 'waiting', 'verifying', 'recovering'].includes(state);
    document.getElementById('btn-pause').disabled = state !== 'executing';
    document.getElementById('btn-resume').disabled = state !== 'paused';
    document.getElementById('btn-stop').disabled = !isRunning && state !== 'paused';
    document.getElementById('submit-btn').disabled = isRunning || state === 'paused';
}

function addLog(msg, type, time) {
    const log = document.getElementById('log');
    const entry = document.createElement('div');
    entry.className = `entry ${type}`;
    entry.innerHTML = `<span class="time">${time}</span>${escapeHtml(msg)}`;
    log.appendChild(entry);
    log.scrollTop = log.scrollHeight;
}

function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

// ── API Calls ──
async function submitTask() {
    const textarea = document.getElementById('instruction');
    const instruction = textarea.value.trim();
    if (!instruction) return;

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = '⏳ 処理中...';

    try {
        const resp = await fetch(`${BACKEND_URL}/tasks`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ instruction }),
        });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();
        updateState(data.state);
        updateStat('stat-actions', data.action_count);
        updateStat('stat-success', data.success_count);
        updateStat('stat-failure', data.failure_count);
        updateButtons(data.state);
        btn.textContent = '▶ 実行';
        textarea.value = '';
        addLog(`📝 ${instruction}`, 'action', new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' }));
    } catch (e) {
        btn.disabled = false;
        btn.textContent = '▶ 実行';
        addLog(`API エラー: ${e.message}`, 'error', new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' }));
    }
}

async function control(action) {
    try {
        await fetch(`${BACKEND_URL}/tasks/current/${action}`, { method: 'POST' });
    } catch (e) {
        addLog(`操作エラー: ${e.message}`, 'error', new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' }));
    }
}

// ── Init ──
document.addEventListener('DOMContentLoaded', () => {
    initVNC();
    connectWS();
});

// Enter で送信
document.getElementById('instruction').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        submitTask();
    }
});

// グローバル公開
window.submitTask = submitTask;
window.control = control;
</script>
</body>
</html>
