services:
  vm:
    build:
      context: ./vm
      dockerfile: Dockerfile
    ports:
      - "5900:5900"
    environment:
      - VM_MEMORY=2048
      - VM_VNC_PORT=5900
      - USE_KVM=${USE_KVM:-false}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c", "echo | nc -z localhost 5900"]
      interval: 10s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    env_file:
      - .env
    environment:
      - VNC_HOST=vm
      - VNC_PORT=5900
      - PORT=8081
    volumes:
      - ./data:/app/data
    depends_on:
      vm:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    restart: unless-stopped

  websockify:
    build:
      context: ./websockify
      dockerfile: Dockerfile
    command: 0.0.0.0:6080 vm:5900
    ports:
      - "6080:6080"
    restart: unless-stopped
