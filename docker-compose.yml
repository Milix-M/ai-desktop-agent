version: "3.9"

services:
  vm:
    build:
      context: ./vm
      dockerfile: Dockerfile
    devices:
      - /dev/kvm:/dev/kvm
    ports:
      - "5900:5900"
    volumes:
      - vm_data:/vm
    environment:
      - VM_IMAGE=/vm/desktop.qcow2
      - VM_MEMORY=4096
      - VM_VNC_PORT=5900
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c", "echo | nc -z localhost 5900"]
      interval: 10s
      retries: 5
      start_period: 300s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - VNC_HOST=vm
      - VNC_PORT=5900
      - LLM_PROVIDER=${LLM_PROVIDER:-anthropic}
      - LLM_MODEL=${LLM_MODEL:-claude-sonnet-4-20250514}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
    volumes:
      - ./data:/app/data
    depends_on:
      vm:
        condition: service_healthy
    restart: unless-stopped

  websockify:
    image: ghcr.io/novnc/websockify:latest
    command: vm:5900
    ports:
      - "6080:5900"
    restart: unless-stopped

  # frontend は未実装のためコメントアウト
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - NEXT_PUBLIC_BACKEND_URL=http://localhost:8080
  #     - NEXT_PUBLIC_WEBSOCKIFY_URL=http://localhost:6080
  #   depends_on:
  #     - backend
  #   restart: unless-stopped

volumes:
  vm_data:
